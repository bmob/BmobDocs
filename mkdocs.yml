site_name: Bmob文档中心

theme:
  name: material
  custom_dir: theme/bmob-material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - navigation.tabs
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tooltips
    - toc.follow
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: 切换至浅色模式
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: 切换至深色模式
  font:
    text: Roboto
    code: Roboto Mono

docs_dir: mds
site_dir: docs

repo_url: https://github.com/bmob/bmobdocs/
copyright: Bmob, Maintained by the Bmob Support.

plugins:
  - search

nav:
  - 文档首页: index.md
  - 数据服务:
      - REST API:
          - 快速入门: data/restful/index.md
          - 开发文档: data/restful/develop_doc.md
      - Android:
          - 快速入门: data/android/index.md
          - 开发文档: data/android/develop_doc.md
          - 示例/功能: data/android/example.md
          - 自动更新: data/android/auto_update.md
      - iOS:
          - 快速入门: data/ios/index.md
          - 开发文档: data/ios/develop_doc.md
          - 示例/功能: data/ios/example.md
          - 类库文档: data/ios/classdoc.md
          - libGDX: data/ios/lib_gdx.md
          - Swift快速入门: data/ios/swift_quick_start.md
