<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频教程 - Bmob文档中心</title>
    <link rel="shortcut icon" href="../assets/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --brand: #3593ff;
            --brand-dark: #2563eb;
            --brand-light: #eff6ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 64px;
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 24px;
        }
        .navbar-inner {
            max-width: 1280px; width: 100%; margin: 0 auto;
            display: flex; align-items: center; gap: 32px;
        }
        .navbar-logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--text);
            font-weight: 700; font-size: 18px;
            flex-shrink: 0;
        }
        .navbar-logo img { height: 32px; }
        .navbar-logo span { color: var(--brand); }
        .navbar-tabs {
            display: flex; gap: 4px; overflow-x: auto;
            scrollbar-width: none;
        }
        .navbar-tabs::-webkit-scrollbar { display: none; }
        .navbar-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            white-space: nowrap;
            cursor: pointer;
            transition: all .2s;
            border: none; background: none;
        }
        .navbar-tab:hover { background: var(--brand-light); color: var(--brand); }
        .navbar-tab.active {
            background: var(--brand);
            color: #fff;
        }

        /* ── Hero ── */
        .hero {
            margin-top: 64px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #7c3aed 100%);
            padding: 60px 24px 48px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
        .hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; letter-spacing: -.02em; }
        .hero p { font-size: 16px; opacity: .85; line-height: 1.7; }

        /* ── Content ── */
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

        .section-title {
            font-size: 22px; font-weight: 700; margin-bottom: 20px;
            padding-left: 14px; border-left: 4px solid var(--brand);
            color: var(--text);
        }

        .chapter-group { margin-bottom: 28px; }
        .chapter-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .2s;
        }
        .chapter-card:hover { box-shadow: var(--shadow); }
        .chapter-header {
            padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; user-select: none;
            transition: background .15s;
        }
        .chapter-header:hover { background: var(--brand-light); }
        .chapter-header .icon {
            width: 36px; height: 36px;
            background: var(--brand-light);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .chapter-header .icon svg { width: 18px; height: 18px; color: var(--brand); }
        .chapter-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
        .chapter-header .arrow {
            width: 20px; height: 20px; color: var(--text-muted);
            transition: transform .25s;
        }
        .chapter-card.open .chapter-header .arrow { transform: rotate(180deg); }
        .chapter-body {
            max-height: 0; overflow: hidden;
            transition: max-height .35s ease;
        }
        .chapter-card.open .chapter-body { max-height: 3000px; }

        /* ── Video items ── */
        .video-list { padding: 4px 16px 16px; }
        .video-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all .2s;
            text-decoration: none; color: inherit;
        }
        .video-item:hover { background: var(--brand-light); }
        .video-play-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform .2s;
        }
        .video-item:hover .video-play-icon { transform: scale(1.1); }
        .video-play-icon svg { width: 16px; height: 16px; color: #fff; margin-left: 2px; }
        .video-info { flex: 1; min-width: 0; }
        .video-title { font-size: 14px; font-weight: 500; color: var(--text); }
        .video-detail { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .video-duration {
            font-size: 13px; color: var(--text-secondary);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,.85);
            display: none; align-items: center; justify-content: center;
            padding: 24px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            position: relative;
            width: 100%; max-width: 960px;
            aspect-ratio: 16/10;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
        }
        .modal iframe { width: 100%; height: 100%; border: none; }
        .modal-close {
            position: absolute; top: -48px; right: 0;
            width: 40px; height: 40px;
            background: rgba(255,255,255,.1);
            border: none; border-radius: 50%;
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .modal-close:hover { background: rgba(255,255,255,.25); }
        .modal-close svg { width: 20px; height: 20px; }
        .modal-bilibili {
            position: absolute; top: -48px; right: 52px;
            height: 40px; padding: 0 16px;
            background: #fb7299;
            border: none; border-radius: 20px;
            color: #fff; cursor: pointer;
            font-size: 13px; font-weight: 600;
            text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            transition: background .2s;
        }
        .modal-bilibili:hover { background: #e85680; }
        .modal-title {
            position: absolute; top: -48px; left: 0;
            color: #fff; font-size: 14px; font-weight: 600;
            line-height: 40px;
            max-width: 60%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .hero { padding: 40px 20px 32px; }
            .hero h1 { font-size: 24px; }
            .hero p { font-size: 14px; }
            .container { padding: 20px 16px 60px; }
            .navbar { padding: 0 16px; }
            .navbar-inner { gap: 16px; }
            .navbar-logo span { display: none; }
            .modal { aspect-ratio: 16/9; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-inner">
        <a href="../" class="navbar-logo">
            <img src="../assets/img/logo.png" alt="Bmob">
            <span>视频教程</span>
        </a>
        <div class="navbar-tabs" id="navTabs"></div>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="hero-content">
        <h1>Bmob 视频教程</h1>
        <p>从入门到精通，通过视频快速掌握 Bmob 后端云服务的各项功能</p>
    </div>
</div>

<!-- Content -->
<div class="container" id="app"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-title" id="modalTitle"></div>
        <a class="modal-bilibili" id="modalBilibili" href="#" target="_blank">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.773s-2.262 1.524-3.773 1.56H5.333c-1.51-.036-2.769-.556-3.773-1.56S.036 18.858 0 17.347v-7.36c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.262-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.151.929.4.267.249.391.551.391.907 0 .355-.124.657-.373.906zM5.333 7.24c-.746.018-1.373.276-1.88.773-.506.498-.769 1.13-.786 1.894v7.52c.017.764.28 1.395.786 1.893.507.498 1.134.756 1.88.773h13.334c.746-.017 1.373-.275 1.88-.773.506-.498.769-1.129.786-1.893v-7.52c-.017-.765-.28-1.396-.786-1.894-.507-.497-1.134-.755-1.88-.773zM8 11.107c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373zm8 0c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373z"/></svg>
            B站播放
        </a>
        <button class="modal-close" id="modalClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <iframe id="videoIframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script src="data.js"></script>
<script>
(function() {
    var app = document.getElementById('app');
    var navTabs = document.getElementById('navTabs');
    var modal = document.getElementById('modal');
    var videoIframe = document.getElementById('videoIframe');
    var modalTitle = document.getElementById('modalTitle');
    var modalBilibili = document.getElementById('modalBilibili');

    // Play icon SVG
    var playIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

    // Chevron SVG
    var chevron = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';

    // Book SVG for chapter icons
    var bookIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>';

    // Build navigation tabs
    var hash = parseInt(window.location.hash.substring(1));
    if (isNaN(hash) || hash < 0 || hash >= data.length) hash = 0;

    data.forEach(function(item, i) {
        var btn = document.createElement('button');
        btn.className = 'navbar-tab' + (i === hash ? ' active' : '');
        btn.textContent = item.title;
        btn.addEventListener('click', function() {
            window.location.hash = i;
            render(i);
        });
        navTabs.appendChild(btn);
    });

    function render(index) {
        // Update tabs
        var tabs = navTabs.querySelectorAll('.navbar-tab');
        tabs.forEach(function(t, i) {
            t.classList.toggle('active', i === index);
        });

        var item = data[index];
        var html = '<h2 class="section-title">' + item.title + ' 视频教程</h2>';

        item.data.forEach(function(chapter, ci) {
            var isOpen = ci === 0 ? ' open' : '';
            html += '<div class="chapter-group">';
            html += '<div class="chapter-card' + isOpen + '" data-chapter="' + ci + '">';
            html += '<div class="chapter-header" onclick="this.parentElement.classList.toggle(\'open\')">';
            html += '<div class="icon">' + bookIcon + '</div>';
            html += '<h3>' + chapter.title + '</h3>';
            html += chevron;
            html += '</div>';
            html += '<div class="chapter-body"><div class="video-list">';

            chapter.chapter.forEach(function(video) {
                var detail = video.detail ? '<div class="video-detail">' + video.detail + '</div>' : '';
                html += '<div class="video-item" data-id="' + video.id + '" data-bilibili="' + video.bilibili + '" data-title="' + video.title.replace(/"/g, '&quot;') + '">';
                html += '<div class="video-play-icon">' + playIcon + '</div>';
                html += '<div class="video-info">';
                html += '<div class="video-title">' + video.title + '</div>';
                html += detail;
                html += '</div>';
                html += '<div class="video-duration">' + video.time + '</div>';
                html += '</div>';
            });

            html += '</div></div></div></div>';
        });

        app.innerHTML = html;

        // Bind click events for video items
        app.querySelectorAll('.video-item').forEach(function(el) {
            el.addEventListener('click', function() {
                var id = this.getAttribute('data-id');
                var bilibili = this.getAttribute('data-bilibili');
                var title = this.getAttribute('data-title');
                openVideo(id, bilibili, title);
            });
        });
    }

    function openVideo(id, bilibili, title) {
        modalTitle.textContent = title;
        modalBilibili.href = bilibili;
        videoIframe.src = 'https://player.youku.com/embed/' + id;
        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeVideo() {
        videoIframe.src = '';
        modal.classList.remove('show');
        document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeVideo);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeVideo();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeVideo();
    });

    // Initial render
    render(hash);
})();
</script>
</body>
</html>
